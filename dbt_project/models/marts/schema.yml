# schema.yml
# Documents and tests our mart models.
# dbt runs these tests automatically to validate data quality.

version: 2

models:
  - name: mart_stock_performance
    description: >
      Stock price performance metrics with moving averages
      and volatility. Main model for price trend analysis.
    columns:
      - name: ticker
        description: Stock ticker symbol
        tests:
          - not_null
      - name: date
        description: Trading date
        tests:
          - not_null
      - name: close_price
        description: Closing stock price
        tests:
          - not_null
      - name: moving_avg_7d
        description: 7-day moving average of closing price
      - name: moving_avg_20d
        description: 20-day moving average of closing price

  - name: mart_github_correlation
    description: >
      Combined stock and GitHub activity data for correlation
      analysis. Core analytical table for this project.
    columns:
      - name: ticker
        description: Stock ticker symbol
        tests:
          - not_null
      - name: date
        description: Trading date
        tests:
          - not_null
      - name: developer_activity_score
        description: Combined commits and PRs score per day
      - name: is_high_activity_day
        description: True if commits exceeded 10 that day